---
# Kernel preparation for a Kubernetes node: swap off, modules, sysctl.

# --- Disable swap (runtime + persistent + zram) ----------------------------
- name: Disable all swap now
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb | default(0) | int > 0
  changed_when: ansible_swaptotal_mb | default(0) | int > 0

- name: Remove swap entries from /etc/fstab
  ansible.posix.mount:
    path: "{{ item.mount }}"
    fstype: "{{ item.fstype }}"
    state: absent
  loop: "{{ ansible_mounts | selectattr('fstype', 'equalto', 'swap') | list }}"
  when: ansible_mounts is defined

- name: Comment out any remaining swap lines in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1  # disabled for kubernetes'

- name: Mask zram swap generator (Ubuntu ships zram-config on some images)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    masked: true
    state: stopped
  loop:
    - "dev-zram0.swap"
    - "zram-config.service"
  failed_when: false

- name: Remove zram-config package if present
  ansible.builtin.apt:
    name: zram-config
    state: absent
  failed_when: false

# --- Kernel modules --------------------------------------------------------
- name: Ensure required kernel modules load at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"

- name: Load kernel modules now
  # modprobe is idempotent (loading an already-loaded module is a no-op, rc=0),
  # so we use the builtin command to avoid a collection dependency on this path.
  ansible.builtin.command: "modprobe {{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false

# --- Sysctl ----------------------------------------------------------------
- name: Apply Kubernetes sysctl parameters
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    content: |
      # Managed by Ansible — required for Kubernetes networking
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Reload sysctl immediately
  ansible.builtin.command: sysctl --system
  changed_when: false
