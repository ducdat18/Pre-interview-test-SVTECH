---
- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted

- name: Restart auditd
  # auditd cannot be restarted via systemctl on some builds; use augenrules.
  # Skipped where the kernel lacks audit support (augenrules would fail).
  ansible.builtin.command: augenrules --load
  changed_when: true
  failed_when: false
