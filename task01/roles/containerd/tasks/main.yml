---
# Install and configure containerd from the official Docker apt repository.

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Docker apt GPG key
  ansible.builtin.get_url:
    url: "{{ docker_apt_key_url }}"
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}
      signed-by=/etc/apt/keyrings/docker.asc]
      {{ docker_apt_repo }} {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true

- name: Install containerd.io
  ansible.builtin.apt:
    name: containerd.io
    state: present

- name: Ensure /etc/containerd exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"

# The distro package ships a minimal config.toml with CRI disabled, so always
# render from `containerd config default` and transform in-memory. Works for
# both v1 (sandbox_image = "...") and v2/v3 (sandbox = '...') config formats.
- name: Generate default containerd configuration
  ansible.builtin.command: containerd config default
  register: containerd_default
  changed_when: false

- name: Render containerd config.toml (systemd cgroup + pinned pause image)
  ansible.builtin.copy:
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: "0644"
    content: >-
      {{ containerd_default.stdout
         | regex_replace('SystemdCgroup = false',
                         'SystemdCgroup = ' ~ (containerd_cgroup_systemd | ternary('true', 'false')))
         | regex_replace('sandbox_image = "[^"]*"',
                         'sandbox_image = "' ~ pause_image ~ '"')
         | regex_replace("sandbox = '[^']*'",
                         "sandbox = '" ~ pause_image ~ "'") }}
  notify: Restart containerd

- name: Ensure containerd is enabled and running
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true
