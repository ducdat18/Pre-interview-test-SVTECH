---
# Sysadmin accounts with sudo. Passwords are generated on the control node and
# stored under secrets/<user>.password (0600); only the SHA-512 hash reaches the
# node. Idempotent: the lookup reuses the stored password on re-runs.

- name: Ensure local secrets directory exists (control node)
  ansible.builtin.file:
    path: "{{ playbook_dir }}/secrets"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

- name: Ensure sudo is installed
  ansible.builtin.apt:
    name: sudo
    state: present

- name: Create sysadmin groups membership targets exist
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ sysadmins | map(attribute='groups') | flatten | unique }}"

- name: Create sysadmin accounts
  ansible.builtin.user:
    name: "{{ item.name }}"
    comment: "{{ item.comment | default('') }}"
    groups: "{{ item.groups | join(',') }}"
    append: true
    shell: /bin/bash
    create_home: true
    password: >-
      {{ lookup('password',
                playbook_dir ~ '/secrets/' ~ item.name ~ '.password'
                ~ ' length=' ~ sysadmin_password_length
                ~ ' chars=ascii_letters,digits,punctuation')
         | password_hash('sha512') }}
    update_password: on_create
  loop: "{{ sysadmins }}"
  loop_control:
    label: "{{ item.name }}"

- name: Grant sudo via drop-in (password required for escalation)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/10-{{ item.name }}"
    content: "{{ item.name }} ALL=(ALL:ALL) ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"
  loop: "{{ sysadmins }}"
  loop_control:
    label: "{{ item.name }}"

- name: Force password change on first login
  ansible.builtin.command: "chage -d 0 {{ item.name }}"
  changed_when: false
  loop: "{{ sysadmins }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.force_password_change | default(true)

- name: Install authorized SSH keys
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
  loop: "{{ sysadmins | subelements('ssh_authorized_keys', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}"

- name: Enforce SSH password login policy per account
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config.d/20-sysadmins.conf
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED — sysadmin ssh policy"
    block: |
      {% for u in sysadmins %}
      Match User {{ u.name }}
          PasswordAuthentication {{ 'yes' if (u.password_login | default(true)) else 'no' }}
      {% endfor %}
  notify: Restart sshd

- name: Report generated credential locations
  ansible.builtin.debug:
    msg: >-
      Account '{{ item.name }}' created. Password stored on control node at
      {{ playbook_dir }}/secrets/{{ item.name }}.password
  loop: "{{ sysadmins }}"
  loop_control:
    label: "{{ item.name }}"
